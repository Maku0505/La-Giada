<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Giada — 菜单管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0908;color:#e8e0d0;font-family:Georgia,serif;min-height:100vh}

/* LOGIN */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px;padding:24px}
#login-screen h1{font-size:28px;color:#c9a96e;letter-spacing:3px}
#login-screen p{font-size:12px;color:#666;letter-spacing:2px;text-transform:uppercase}
#pin-input{width:180px;padding:14px;text-align:center;font-size:28px;letter-spacing:10px;background:#1a1610;border:2px solid #3a2a10;border-radius:10px;color:#f5e6c8;outline:none;font-family:monospace}
#pin-input:focus{border-color:#c9a96e}
#pin-err{color:#e05555;font-size:13px;min-height:18px}
.login-btn{padding:12px 32px;background:#c9a96e;color:#0f0e0c;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}

/* MAIN PANEL */
#main{display:none;flex-direction:column;min-height:100vh}
.top-bar{background:#1a1208;border-bottom:1px solid #3a2a10;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.top-bar h1{font-size:18px;color:#c9a96e;letter-spacing:1px}
.top-bar-right{display:flex;gap:10px;align-items:center}
.add-btn{padding:8px 16px;background:#c9a96e;color:#0f0e0c;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.logout-btn{padding:7px 14px;background:none;border:1px solid #3a2a10;color:#888;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit}

/* CATEGORY TABS */
.cat-tabs{display:flex;gap:6px;padding:12px 16px;overflow-x:auto;background:#0d0c0a;border-bottom:1px solid #1a1610;scrollbar-width:none;flex-shrink:0}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{flex-shrink:0;padding:5px 13px;border-radius:20px;border:1px solid #252010;background:transparent;color:#777;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s}
.cat-tab.active{border-color:#c9a96e;background:rgba(201,169,110,.12);color:#c9a96e}

/* ITEMS LIST */
.items-wrap{flex:1;padding:14px 16px}
.item-row{background:#161410;border:1px solid #1e1a12;border-radius:10px;margin-bottom:10px;overflow:hidden;transition:opacity .2s}
.item-row.sospeso{opacity:.45}
.item-head{display:flex;align-items:center;padding:12px 14px;gap:10px}
.item-num{font-size:10px;color:#c9a96e;background:rgba(201,169,110,.1);border:1px solid rgba(201,169,110,.2);padding:2px 6px;border-radius:3px;font-family:monospace;flex-shrink:0}
.item-name{flex:1;font-size:14px;color:#f0e8d8;font-weight:600}
.item-price{color:#c9a96e;font-weight:700;font-size:14px;flex-shrink:0}
.item-desc{padding:0 14px 8px;font-size:12px;color:#666;line-height:1.5}
.item-actions{display:flex;gap:6px;padding:8px 14px;border-top:1px solid #1a1610;justify-content:flex-end}
.act-btn{padding:5px 12px;border-radius:6px;border:1px solid #2a2010;background:transparent;font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s}
.act-edit{color:#6ab0f5;border-color:#1a3050}
.act-edit:hover{background:rgba(106,176,245,.1)}
.act-suspend{color:#f5a623;border-color:#3a2810}
.act-suspend:hover{background:rgba(245,166,35,.08)}
.act-delete{color:#e05555;border-color:#3a1010}
.act-delete:hover{background:rgba(224,85,85,.08)}
.badge-sospeso{font-size:10px;color:#f5a623;border:1px solid #f5a62344;padding:1px 6px;border-radius:3px;margin-left:4px}

/* MODAL */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:flex-end;justify-content:center}
#modal-overlay.open{display:flex}
#modal{background:#131108;border-top:2px solid #3a2a10;border-radius:16px 16px 0 0;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;padding:20px}
.modal-title{font-size:18px;color:#f5e6c8;font-weight:700;margin-bottom:18px}
.fgroup{margin-bottom:14px}
.flabel{font-size:11px;color:#888;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;display:block}
.finput,.fselect,.ftextarea{width:100%;padding:10px 12px;background:#1a1610;border:1px solid #2a2010;border-radius:6px;color:#e8e0d0;font-size:14px;font-family:inherit;outline:none}
.finput:focus,.fselect:focus,.ftextarea:focus{border-color:#c9a96e}
.ftextarea{resize:vertical;min-height:60px}
.fselect option{background:#1a1610}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-btns{display:flex;gap:10px;margin-top:18px}
.modal-save{flex:1;padding:12px;background:#c9a96e;color:#0f0e0c;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.modal-cancel{padding:12px 20px;background:none;border:1px solid #3a2a10;color:#888;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit}

.sync-badge{font-size:11px;color:#4caf50;margin-left:8px}
.sync-badge.err{color:#e05555}

.empty-msg{text-align:center;color:#555;padding:48px;font-size:14px}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#c9a96e;color:#0f0e0c;padding:10px 22px;border-radius:24px;font-size:13px;font-weight:700;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.seed-btn{padding:7px 12px;background:none;border:1px solid #3a2a10;color:#c9a96e;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <h1>La Giada</h1>
  <p>菜单管理</p>
  <input id="pin-input" type="password" maxlength="10" placeholder="••••">
  <div id="pin-err"></div>
  <button class="login-btn" id="login-btn">登录</button>
</div>

<!-- MAIN PANEL -->
<div id="main">
  <div class="top-bar">
    <h1>📋 菜单管理 <span class="sync-badge" id="sync-badge"></span></h1>
    <div class="top-bar-right">
      <button class="seed-btn" id="seed-btn" title="加载默认菜品">⬇️ 加载菜品</button>
      <button class="add-btn" id="add-btn">+ 新增菜品</button>
      <button class="logout-btn" id="logout-btn">退出</button>
    </div>
  </div>
  <div class="cat-tabs" id="cat-tabs"></div>
  <div class="items-wrap" id="items-wrap"><div class="empty-msg">加载中...</div></div>
</div>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <div class="modal-title" id="modal-title">新增菜品</div>
    <div class="frow">
      <div class="fgroup">
        <label class="flabel">编号 (如 42)</label>
        <input class="finput" id="f-n" type="text" placeholder="如 42">
      </div>
      <div class="fgroup">
        <label class="flabel">价格 (€)</label>
        <input class="finput" id="f-price" type="number" step="0.50" min="0" placeholder="6.00">
      </div>
    </div>
    <div class="fgroup">
      <label class="flabel">菜品名称</label>
      <input class="finput" id="f-name" type="text" placeholder="如 咖喱鸡">
    </div>
    <div class="fgroup">
      <label class="flabel">描述 / 食材</label>
      <textarea class="ftextarea" id="f-desc" placeholder="如 竹笋, 洋葱, 咖喱酱"></textarea>
    </div>
    <div class="frow">
      <div class="fgroup">
        <label class="flabel">分类</label>
        <select class="fselect" id="f-cat"></select>
      </div>
      <div class="fgroup">
        <label class="flabel">数量 (如 2pz)</label>
        <input class="finput" id="f-qty" type="text" placeholder="可选">
      </div>
    </div>
    <div class="fgroup">
      <label class="flabel">冷冻</label>
      <select class="fselect" id="f-frozen">
        <option value="0">No</option>
        <option value="1">Sì ❄</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" id="modal-cancel">取消</button>
      <button class="modal-save" id="modal-save">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, getDocs, setDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDJ0uQcIel_t54APpZ1QiyNvgnQCBSGwhc",
  authDomain: "lagia-bdd78.firebaseapp.com",
  projectId: "lagia-bdd78",
  storageBucket: "lagia-bdd78.firebasestorage.app",
  messagingSenderId: "976968741464",
  appId: "1:976968741494:web:e02ea39018a6fb8979502d"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── CATEGORIES (fixed) ────────────────────────────────────────────────────────
const CATS = [
  {id:"antipasti",  label:"Antipasti",   icon:"🥢"},
  {id:"box",        label:"套餐盒",    icon:"📦"},
  {id:"poke",       label:"波奇碗",   icon:"🥗"},
  {id:"riso-pasta", label:"米饭/面食",icon:"🍜"},
  {id:"pollo",      label:"鸡肉",       icon:"🍗"},
  {id:"maiale-anatra",label:"猪肉/鸭肉",icon:"🦆"},
  {id:"manzo",      label:"牛肉",       icon:"🥩"},
  {id:"pesce",      label:"海鲜",icon:"🦐"},
  {id:"contorno",   label:"配菜",    icon:"🥦"},
  {id:"nighiri",    label:"握寿司",     icon:"🍣"},
  {id:"gunkan",     label:"军舰卷",      icon:"🌊"},
  {id:"temaki",     label:"手卷",      icon:"🌮"},
  {id:"hossomaki",  label:"细卷",   icon:"🌀"},
  {id:"hosso-fritto",label:"炸细卷",icon:"🔥"},
  {id:"uramaki",    label:"反卷",     icon:"🎯"},
  {id:"sushi-misto",label:"综合寿司", icon:"🎌"},
  {id:"tartare",    label:"刺身/鞑靼",icon:"🐟"},
  {id:"cena",       label:"晚餐套餐",   icon:"🌙"},
  {id:"dolci",      label:"甜点",       icon:"🍡"},
  {id:"bevande",    label:"饮料",     icon:"🍺"},
  {id:"vini",       label:"葡萄酒",        icon:"🍷"},
  {id:"liquori",    label:"酒水",     icon:"🥃"},
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let allItems = [];   // [{docId, catId, n, name, desc, price, qty, f, sospeso}]
let curCat   = "antipasti";
let editId   = null; // docId being edited (null = new)
let unsub    = null;

// ── AUTH ──────────────────────────────────────────────────────────────────────
const PIN = "8888";
document.getElementById("pin-input").addEventListener("input", () => {
  document.getElementById("pin-err").textContent = "";
});

document.getElementById("logout-btn").addEventListener("click", () => {
  if(unsub) unsub();
  document.getElementById("main").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("pin-input").value = "";
});

// ── CAT TABS ──────────────────────────────────────────────────────────────────
function buildCatTabs(){
  document.getElementById("cat-tabs").innerHTML = CATS.map(c =>
    `<button class="cat-tab${c.id===curCat?" active":""}" data-cat="${c.id}">${c.icon} ${c.label}</button>`
  ).join("");
  document.getElementById("cat-tabs").addEventListener("click", e => {
    const btn = e.target.closest("[data-cat]");
    if(!btn) return;
    curCat = btn.dataset.cat;
    document.querySelectorAll(".cat-tab").forEach(b => b.classList.toggle("active", b.dataset.cat===curCat));
    renderItems();
  });
}

// ── FIRESTORE SYNC ────────────────────────────────────────────────────────────
function startSync(){
  setSyncBadge("⏳ 同步中...", false);
  unsub = onSnapshot(collection(db, "menu"), snap => {
    allItems = snap.docs.map(d => ({docId: d.id, ...d.data()}));
    // Sort by category order then by n
    allItems.sort((a,b) => {
      const ci = CATS.findIndex(c=>c.id===a.catId) - CATS.findIndex(c=>c.id===b.catId);
      if(ci!==0) return ci;
      return String(a.n).localeCompare(String(b.n), undefined, {numeric:true});
    });
    setSyncBadge("● 实时", false);
    renderItems();
  }, err => {
    setSyncBadge("✗ 离线", true);
  });
}

function setSyncBadge(txt, isErr){
  const b = document.getElementById("sync-badge");
  b.textContent = txt;
  b.className = "sync-badge" + (isErr?" err":"");
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderItems(){
  const wrap = document.getElementById("items-wrap");
  const filtered = allItems.filter(it => it.catId === curCat);
  if(!filtered.length){
    wrap.innerHTML = '<div class="empty-msg">Nessun piatto in questa categoria.<br>Clicca "+ 新增菜品" per aggiungerne uno.</div>';
    return;
  }
  wrap.innerHTML = filtered.map(it => `
    <div class="item-row${it.sospeso?" sospeso":""}" data-doc="${it.docId}">
      <div class="item-head">
        <span class="item-num">${it.n}</span>
        <span class="item-name">${it.name}${it.sospeso?'<span class="badge-sospeso">已暂停</span>':''}</span>
        ${it.f?'<span style="color:#6ab0f5;font-size:12px">❄</span>':''}
        ${it.qty?`<span style="color:#888;font-size:11px">${it.qty}</span>`:''}
        <span class="item-price">€ ${Number(it.price).toFixed(2).replace(".",",")}</span>
      </div>
      ${it.desc?`<div class="item-desc">${it.desc}</div>`:''}
      <div class="item-actions">
        <button class="act-btn act-edit" data-action="edit" data-doc="${it.docId}">✏️ 修改</button>
        <button class="act-btn act-suspend" data-action="suspend" data-doc="${it.docId}">${it.sospeso?"▶️ 恢复":"⏸ 暂停"}</button>
        <button class="act-btn act-delete" data-action="delete" data-doc="${it.docId}">🗑 删除</button>
      </div>
    </div>`).join("");

  // Event delegation
  wrap.querySelectorAll("[data-action]").forEach(btn => {
    btn.addEventListener("click", () => {
      const action = btn.dataset.action;
      const docId  = btn.dataset.doc;
      const item   = allItems.find(i => i.docId === docId);
      if(!item) return;
      if(action==="edit")    openModal(item);
      if(action==="suspend") toggleSuspend(item);
      if(action==="delete")  confirmDelete(item);
    });
  });
}

// ── SUSPEND ───────────────────────────────────────────────────────────────────
async function toggleSuspend(item){
  try {
    await updateDoc(doc(db,"menu",item.docId), {sospeso: !item.sospeso});
    showToast(item.sospeso ? "菜品已恢复" : "菜品已暂停");
  } catch(e){ alert("错误："+e.message); }
}

// ── DELETE ────────────────────────────────────────────────────────────────────
function confirmDelete(item){
  if(!confirm('确定删除 "'+item.name+'" 吗？')) return;
  deleteDoc(doc(db,"menu",item.docId))
    .then(()=>showToast("菜品已删除"))
    .catch(e=>alert("错误："+e.message));
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function populateCatSelect(){
  document.getElementById("f-cat").innerHTML = CATS.map(c =>
    `<option value="${c.id}">${c.icon} ${c.label}</option>`
  ).join("");
}

document.getElementById("add-btn").addEventListener("click", () => openModal(null));
document.getElementById("seed-btn").addEventListener("click", async () => {
  if(!confirm("将所有默认菜品加载到 Firebase？")) return;
  setSyncBadge("⏳ 加载中...", false);
  await seedIfEmpty(true);
});
// seed button hidden - use seedIfEmpty() from console if needed
document.getElementById("modal-cancel").addEventListener("click", closeModal);
document.getElementById("modal-overlay").addEventListener("click", e => {
  if(e.target === document.getElementById("modal-overlay")) closeModal();
});
document.getElementById("modal-save").addEventListener("click", saveItem);

function openModal(item){
  populateCatSelect();
  editId = item ? item.docId : null;
  document.getElementById("modal-title").textContent = item ? "修改菜品" : "新增菜品";
  document.getElementById("f-n").value      = item ? item.n     : "";
  document.getElementById("f-name").value   = item ? item.name  : "";
  document.getElementById("f-desc").value   = item ? (item.desc||"") : "";
  document.getElementById("f-price").value  = item ? item.price : "";
  document.getElementById("f-qty").value    = item ? (item.qty||"") : "";
  document.getElementById("f-frozen").value = item ? (item.f?"1":"0") : "0";
  document.getElementById("f-cat").value    = item ? item.catId : curCat;
  document.getElementById("modal-overlay").classList.add("open");
  document.getElementById("f-name").focus();
}

function closeModal(){
  document.getElementById("modal-overlay").classList.remove("open");
  editId = null;
}

async function saveItem(){
  const n     = document.getElementById("f-n").value.trim();
  const name  = document.getElementById("f-name").value.trim();
  const price = parseFloat(document.getElementById("f-price").value);
  const desc  = document.getElementById("f-desc").value.trim();
  const qty   = document.getElementById("f-qty").value.trim();
  const f     = document.getElementById("f-frozen").value === "1" ? 1 : 0;
  const catId = document.getElementById("f-cat").value;

  if(!n || !name || isNaN(price)){
    alert("编号、名称和价格为必填项。"); return;
  }

  const data = { n, name, price, desc, qty, f, catId, sospeso: false,
    ps: "€ " + price.toFixed(2).replace(".",",") };

  try {
    if(editId){
      // Keep sospeso status when editing
      const existing = allItems.find(i=>i.docId===editId);
      data.sospeso = existing ? existing.sospeso : false;
      await updateDoc(doc(db,"menu",editId), data);
      showToast("菜品已更新 ✅");
    } else {
      // Generate doc id from catId + n
      const docId = catId + "_" + n.replace(/[^a-z0-9]/gi,"_");
      await setDoc(doc(db,"menu",docId), data);
      showToast("菜品已添加 ✅");
    }
    closeModal();
  } catch(e){ alert("保存错误："+e.message); }
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2000);
}

// ── INIT: seed Firebase with default menu if empty ────────────────────────────
async function seedIfEmpty(force){
  const snap = await getDocs(collection(db,"menu"));
  if(!snap.empty && !force) return; // already seeded
  setSyncBadge("⏳ 加载数据...", false);
  const batch = writeBatch(db);
  const SEED_MENU = [
  {id:"antipasti",label:"Antipasti",icon:"🥢",items:[
    {n:"0",  name:"Involtini con Gamberi",         desc:"Farina, carota, cipolla, gamberi",                               price:2.50,ps:"€ 2,50",qty:"2pz",f:1},
    {n:"1",  name:"Involtini Primavera",            desc:"Farina, carota, cappuccio, carne di maiale, cipolla",           price:2.50,ps:"€ 2,50",qty:"2pz"},
    {n:"2",  name:"Patatine Fritte",                desc:"",                                                              price:3.00,ps:"€ 3,00",f:1},
    {n:"3",  name:"Involtini Samosa",               desc:"Ripieno di verdure e curry",                                    price:1.50,ps:"€ 1,50",qty:"3pz",f:1},
    {n:"3A", name:"Fagottini Fritti",               desc:"Verdure miste",                                                 price:4.00,ps:"€ 4,00",qty:"4pz",f:1},
    {n:"4",  name:"Pane Cinese",                    desc:"Farina, sale, lievito",                                         price:1.50,ps:"€ 1,50"},
    {n:"5",  name:"Nuvolette di Gamberi",           desc:"Fecola di patate, aroma di gambero",                            price:2.00,ps:"€ 2,00"},
    {n:"6",  name:"Chips Sake",                     desc:"Chips, tartare salmone, avocado, salsa teriyaki, salsa limone", price:4.00,ps:"€ 4,00",qty:"2pz"},
    {n:"6A", name:"Polpette Fritte",                desc:"Patate, salmone, salsa teriyaki",                               price:4.00,ps:"€ 4,00",qty:"4pz",f:1},
    {n:"7",  name:"Ravioli con Verdure al Vapore",  desc:"Farina, cappuccio, carota, funghi neri",                        price:3.00,ps:"€ 3,00",qty:"4pz",f:1},
    {n:"8",  name:"Ravioli con Carne al Vapore",    desc:"Farina, cappuccio, cipolla, carne di maiale",                   price:3.00,ps:"€ 3,00",qty:"4pz",f:1},
    {n:"9",  name:"Ravioli con Carne alla Griglia", desc:"Farina, cappuccio, cipolla, carne di maiale",                   price:3.50,ps:"€ 3,50",qty:"4pz",f:1},
    {n:"10", name:"Shaomai",                        desc:"Farina, gamberi, cipolla, carne di maiale",                     price:3.50,ps:"€ 3,50",qty:"4pz",f:1},
    {n:"11", name:"Sake Bao",                       desc:"Salmone, mayo piccante, teriyaki, sesame, pane al vapore",      price:4.00,ps:"€ 4,00",qty:"1pz",f:1},

  let batches = [writeBatch(db)];
  let batchCount = 0;
  for(const cat of SEED_MENU){
    if(cat.special) continue;
    for(const it of cat.items){
      if(batchCount >= 400){ batches.push(writeBatch(db)); batchCount=0; }
      const b = batches[batches.length-1];
      const docId = cat.id+"_"+String(it.n).replace(/[^a-z0-9]/gi,"_");
      b.set(doc(db,"menu",docId), {
        n: it.n, name: it.name, desc: it.desc||"",
        price: it.price, ps: it.ps||("€ "+Number(it.price).toFixed(2).replace(".",",")),
        qty: it.qty||"", f: it.f||0, catId: cat.id, sospeso: false
      });
      batchCount++; count++;
    }
  }
  for(const b of batches) await b.commit();
  setSyncBadge("● 实时", false);
  showToast("✅ 已加载 "+count+" 道菜品！");

// Attach login listeners once
document.getElementById("login-btn").addEventListener("click", handleLogin);
document.getElementById("pin-input").addEventListener("keydown", e => {
  if(e.key==="Enter") handleLogin();
});

async function handleLogin(){
  const val = document.getElementById("pin-input").value;
  if(val === PIN){
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("main").style.display = "flex";
    buildCatTabs();
    await seedIfEmpty();
    startSync();
  } else {
    document.getElementById("pin-err").textContent = "密码错误";
    document.getElementById("pin-input").value = "";
    setTimeout(()=>document.getElementById("pin-err").textContent="",1500);
  }
}
